<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  &
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>メニュー全体 — Dining TASHIRO</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #070810;
      background-image: url('image/backgraound/backgraund.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Shippori Mincho', serif;
      color: #ffffff;
      padding: 24px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 40px 0 32px;
    }

    .back-link {
      display: inline-block;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #ffffff;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .menu-image-wrap {
      text-align: center;
      padding-bottom: 48px;
    }

    .menu-image-wrap img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="back-link" href="menu.html">← メニューに戻る</a>
      <div class="page-title">メニュー全体</div>
    </header>

    <div class="menu-image-wrap">
      <img src="image/menu/menu.png" alt="メニュー全体">
    </div>
  </div>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.querySelectorAll("a[href]").forEach(function(link) {
      var href = link.getAttribute("href");
      if (href && !href.startsWith("http") && !href.startsWith("#")) {
        link.addEventListener("click", function(e) {
          e.preventDefault();
          var target = this.getAttribute("href");
          document.querySelectorAll(".container, .card, .dining-title, .subtitle").forEach(function(el) {
            el.style.transition = "opacity 0.3s ease";
            el.style.opacity = "0";
          });
          setTimeout(function() { window.location.href = target; }, 300);
        });
      }
    });
  });
</script>
</body>
</html>
