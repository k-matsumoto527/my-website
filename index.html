<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Dining TASHIRO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.15);
      --border: rgba(255,255,255,0.12);
      --card: rgba(10,9,6,0.75);
    }

    body {
      min-height: 100vh;
      background-color: #070810;
      background-image: url('image/backgraound/backgraund.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Shippori Mincho', serif;
      color: #fff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== HEADER ===== */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(7,8,16,0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .site-logo {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .site-nav { display: flex; gap: 8px; }

    .site-nav a {
      font-size: 0.8rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.15em;
      padding: 7px 20px;
      border: 1px solid var(--border);
      border-radius: 40px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .site-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 48px;
      gap: 0;
      opacity: 0;
      animation: fadeIn 2s ease 0.2s forwards;
    }

    .hero-title-img {
      width: min(420px, 80vw);
      margin-bottom: 20px;
    }

    .hero-sub {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      text-align: center;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 32px;
      opacity: 0.7;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .nav-link {
      font-size: 0.85rem;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.15em;
      padding: 12px 36px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      transition: background 0.2s, border-color 0.2s;
    }

    .nav-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sns-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .sns-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sns-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .shop-info {
      width: 100%;
      max-width: 360px;
    }

    .shop-info-row {
      display: flex;
      gap: 16px;
      font-size: 0.82rem;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.6;
    }

    .shop-info-row:last-child { border-bottom: none; }

    .shop-info-label {
      min-width: 5em;
      color: var(--accent);
      opacity: 0.85;
    }

    @media (max-width: 480px) {
      .site-header { padding: 16px 20px; }
      .hero-title-img { width: min(320px, 90vw); }
      .nav-links { flex-direction: column; align-items: center; }
      .nav-link { width: 200px; text-align: center; }
      .sns-links { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="site-logo" href="index.html">Dining TASHIRO</a>
    <nav class="site-nav">
      <a href="menu.html">Menu</a>
      <a href="blog.html">Blog</a>
    </nav>
  </header>

  <main class="hero">
    <img class="hero-title-img" src="image/title/title.png" alt="Dining TASHIRO">
    <p class="hero-sub">巨匠田代監修　おいしい料理とお酒のお店</p>

    <div class="divider"></div>

    <div class="nav-links">
      <a class="nav-link" href="menu.html">Menu</a>
      <a class="nav-link" href="blog.html">Blog</a>
    </div>

    <div class="sns-links">
      <a class="sns-link" href="https://x.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.256 5.631 5.909-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X (Twitter)
      </a>
      <a class="sns-link" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Instagram
      </a>
    </div>

    <div class="divider"></div>

    <div class="shop-info">
      <div class="shop-info-row"><span class="shop-info-label">住所</span><span>岐阜県XXX</span></div>
      <div class="shop-info-row"><span class="shop-info-label">電話</span><span>XXX-XXXXX</span></div>
      <div class="shop-info-row"><span class="shop-info-label">営業時間</span><span>17:00〜21:00（L.O. 20:30）</span></div>
      <div class="shop-info-row"><span class="shop-info-label">定休日</span><span>月曜日</span></div>
    </div>
  </main>

<script>
  document.querySelectorAll("a[href]").forEach(function(link) {
    var href = link.getAttribute("href");
    if (href && !href.startsWith("http") && !href.startsWith("#")) {
      link.addEventListener("click", function(e) {
        e.preventDefault();
        var target = this.getAttribute("href");
        document.querySelector(".hero").style.opacity = "0";
        document.querySelector(".hero").style.transition = "opacity 0.3s ease";
        setTimeout(function() { window.location.href = target; }, 300);
      });
    }
  });
</script>
</body>
</html>
