<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Dining TASHIRO</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #070810;
      background-image: url('image/backgraound/backgraund.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Shippori Mincho', serif;
      color: #ffffff;
    }

    .card {
      position: fixed;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      padding: 0 24px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: none;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }


    .dining-title {
      position: fixed;
      top: 25%;
      left: 50%;
      transform: translateX(-50%);
      max-width: 480px;
      width: 80%;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }

    .subtitle {
      position: fixed;
      top: calc(25% + 18rem);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }

    .title {
      font-size: 0.9rem;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .shop-info {
      width: 100%;
      margin-bottom: 20px;
      text-align: left;
    }

    .shop-info-row {
      display: flex;
      gap: 12px;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      line-height: 1.5;
    }

    .shop-info-row:last-child {
      border-bottom: none;
    }

    .shop-info-label {
      min-width: 5em;
      opacity: 0.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      margin: 0 auto 20px;
    }


    .nav-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .nav-link {
      font-size: 0.85rem;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 8px 24px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.8);
      transform: translateY(-2px);
    }

    .sns-links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      background: #23263a;
      border: 1px solid #2d3148;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .sns-link:hover {
      background: #2d3148;
      border-color: #6366f1;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .sns-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
      }

      .name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <img class="dining-title" src="image/title/title.png" alt="Dining TASHIRO">
  <div class="subtitle">巨匠田代監修　おいしい料理とお酒のお店</div>
  <div class="card">

    <div class="divider"></div>
    <div class="nav-links">
      <a class="nav-link" href="menu.html">Menu</a>
      <a class="nav-link" href="blog.html">Blog</a>
    </div>
    <div class="sns-links">
      <a class="sns-link" href="https://x.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.256 5.631 5.909-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X (Twitter)
      </a>
      <a class="sns-link" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
        Instagram
      </a>
    </div>
    <div class="divider"></div>
    <div class="shop-info">
      <div class="shop-info-row"><span class="shop-info-label">住所</span><span>岐阜県XXX</span></div>
      <div class="shop-info-row"><span class="shop-info-label">電話</span><span>XXX-XXXXX</span></div>
      <div class="shop-info-row"><span class="shop-info-label">営業時間</span><span>17:00〜21:00（L.O. 20:30）</span></div>
      <div class="shop-info-row"><span class="shop-info-label">定休日</span><span>月曜日</span></div>
    </div>
  </div>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    document.querySelectorAll("a[href]").forEach(function(link) {
      var href = link.getAttribute("href");
      if (href && !href.startsWith("http") && !href.startsWith("#")) {
        link.addEventListener("click", function(e) {
          e.preventDefault();
          var target = this.getAttribute("href");
          document.querySelectorAll(".container, .card, .dining-title, .subtitle").forEach(function(el) {
            el.style.transition = "opacity 0.3s ease";
            el.style.opacity = "0";
          });
          setTimeout(function() { window.location.href = target; }, 300);
        });
      }
    });
  });
</script>
</body>
</html>
