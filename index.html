<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Dining TASHIRO</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #070810;
      background-image: url('image/backgraound/backgraund.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Shippori Mincho', serif;
      color: #ffffff;
    }

    .card {
      position: fixed;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      padding: 0 24px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: none;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }


    .dining-title {
      position: fixed;
      top: 42%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.2rem;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .subtitle {
      position: fixed;
      top: calc(42% + 5rem);
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .title {
      font-size: 0.9rem;
      color: #ffffff;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      margin: 0 auto 20px;
    }


    .nav-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .nav-link {
      font-size: 0.85rem;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover {
      color: #ffffff;
      border-bottom-color: #a5b4fc;
    }

    .sns-links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      background: #23263a;
      border: 1px solid #2d3148;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .sns-link:hover {
      background: #2d3148;
      border-color: #6366f1;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .sns-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
      }

      .name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="dining-title">Dining TASHIRO</div>
  <div class="subtitle">巨匠田代監修　おいしい料理とお酒のお店</div>
  <div class="card">

    <div class="divider"></div>
    <div class="nav-links">
      <a class="nav-link" href="menu.html">Menu</a>
      <a class="nav-link" href="blog.html">Blog</a>
    </div>
    <div class="sns-links">
      <a class="sns-link" href="https://x.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.256 5.631 5.909-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X (Twitter)
      </a>
    </div>
  </div>
</body>
</html>
