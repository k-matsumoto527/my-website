<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>松本健太郎</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #070810;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
      color: #e2e8f0;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      transform: translateY(60px);
      animation: slideInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes slideInUp {
      to {
        transform: translateY(0);
      }
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
      letter-spacing: 1px;
    }

    .name {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .title {
      font-size: 0.9rem;
      color: #818cf8;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .bio {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.75;
      margin-bottom: 32px;
    }

    .sns-links {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .sns-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      background: #23263a;
      border: 1px solid #2d3148;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .sns-link:hover {
      background: #2d3148;
      border-color: #6366f1;
      color: #a5b4fc;
      transform: translateY(-2px);
    }

    .sns-link svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 24px;
      }

      .name {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">松</div>
    <div class="name">松本健太郎</div>
    <div class="title">会社員</div>
    <div class="divider"></div>
    <p class="bio">システムエンジニアしています</p>
    <div class="sns-links">
      <a class="sns-link" href="https://x.com" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.256 5.631 5.909-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        X (Twitter)
      </a>
    </div>
  </div>
</body>
</html>
